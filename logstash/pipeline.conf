input {
  file {
    path => "/path/to/sample-data/apache_access.log"
    start_position => "beginning"
    sincedb_path => "/dev/null"
  }
}

filter {
  grok {
    match => {
      "message" => "%{COMBINEDAPACHELOG}"
    }
  }

  # Parse the timestamp from the log into @timestamp
  date {
    match => ["timestamp", "dd/MMM/yyyy:HH:mm:ss Z"]
    target => "@timestamp"
    remove_field => ["timestamp"]
  }

  # Convert numeric fields from strings
  mutate {
    convert => {
      "response"  => "integer"
      "bytes"     => "integer"
    }
  }

  # Tag failed parses so you can investigate them in Kibana
  if "_grokparsefailure" in [tags] {
    mutate { add_tag => ["parse_error"] }
  }
}

output {
  elasticsearch {
    hosts    => ["${ES_HOST}"]
    user     => "${ES_USER}"
    password => "${ES_PASSWORD}"
    index    => "apache-access-logs-%{+YYYY.MM.dd}"
    # If using Elastic Cloud, use cloud_id and cloud_auth instead:
    # cloud_id   => "${CLOUD_ID}"
    # cloud_auth => "${ES_USER}:${ES_PASSWORD}"
  }

  # Uncomment to echo events to stdout while testing
  # stdout { codec => rubydebug }
}
